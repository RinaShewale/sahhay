<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TTS Enhancer - Sahaay</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="tts-enhancer.css">
     <link rel="stylesheet" href="style.css">
</head>

<body>
      <main>

    <nav>
        <div class="logo">
            <img src="png/fashion.png" alt="">
        </div>
        <div class="ellips"></div>
        <ul>
            <li><a href="index.html"><i class="ri-home-4-line"></i> Home</a></li>
            <li><a href="feature.html"><i class="ri-flag-line"></i> Features</a></li>
            <li><a href="assistent.html"><i class="ri-mic-line"></i> Assistant</a></li>
            <li><a href="support.html"><i class="ri-question-line"></i> Support</a></li>
            <li><a href="about.html"><i class="ri-information-line"></i> About</a></li>
            <li class="sign-link"><a href="register.html"><i class="ri-login-box-line"></i> Sign In</a></li>
        </ul>

        <div class="btn1">
            <a id="signin-link" href="register.html">
                <button id="btn-signin">sign in</button>
            </a>
        </div>

        <div class="menu-toggle">
            <i class="ri-menu-line"></i>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="tts-container">

        <!-- LEFT PANEL: INPUT & CONTROLS -->
        <div class="tts-input-panel">
            <h3>📝 Your Text</h3>
            <textarea id="tts-input" class="tts-textarea" placeholder="Enter your text here..."></textarea>

            <div class="tts-controls">
                <div class="control-group">
                    <label for="tts-mode">🔹 Mode</label>
                    <select id="tts-mode" class="tts-select">
                        <option value="friendly">Friendly</option>
                        <option value="formal">Formal</option>
                        <option value="story">Story</option>
                        <option value="funny">Funny</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="tts-personality">🎭 Personality</label>
                    <select id="tts-personality" class="tts-select">
                        <option value="podcast">Podcast Host</option>
                        <option value="teacher">Teacher</option>
                        <option value="robot">Robot</option>
                        <option value="narrator">Narrator</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="tts-emotion">😊 Emotion</label>
                    <select id="tts-emotion" class="tts-select">
                        <option value="neutral">Neutral</option>
                        <option value="happy">Happy</option>
                        <option value="excited">Excited</option>
                        <option value="calm">Calm</option>
                        <option value="sad">Sad</option>
                        <option value="angry">Angry</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="tts-action">⚡ Action</label>
                    <select id="tts-action" class="tts-select">
                        <option value="improve">Improve</option>
                        <option value="expand">Expand</option>
                        <option value="summarize">Summarize</option>
                    </select>
                </div>
            </div>

            <div class="tts-buttons">
                <button id="tts-enhance-btn" class="btn-primary">
                    <i class="ri-magic-line"></i> Enhance Text
                </button>
                <button id="tts-clear-btn" class="btn-secondary">
                    <i class="ri-delete-bin-line"></i> Clear
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL: OUTPUT & PREVIEW -->
        <div class="tts-output-panel">
            <h3>🎵 Enhanced Output</h3>
            <div id="tts-output" class="tts-output">
                <p class="placeholder">Your enhanced text will appear here...</p>
            </div>

            <div class="tts-actions">
                <button id="tts-speak-btn" class="btn-accent" disabled>
                    <i class="ri-volume-loud-line"></i> Speak
                </button>
                <button id="tts-copy-btn" class="btn-accent" disabled>
                    <i class="ri-file-copy-line"></i> Copy
                </button>
                <button id="tts-download-btn" class="btn-accent" disabled>
                    <i class="ri-download-line"></i> Download
                </button>
            </div>

            <!-- VOICE SETTINGS -->
            <div class="voice-settings">
                <h4>🎙️ Voice Settings</h4>
                <div class="control-group">
                    <label for="voice-lang">Language:</label>
                    <select id="voice-lang" class="voice-select">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="mr-IN">Marathi</option>
                        <option value="fr-FR">French</option>
                        <option value="es-ES">Spanish</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="voice-gender">Voice:</label>
                    <select id="voice-gender" class="voice-select">
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="voice-speed">Speed:</label>
                    <input type="range" id="voice-speed" class="voice-slider" min="0.5" max="2" step="0.1" value="1">
                    <span id="speed-display">1.0x</span>
                </div>
            </div>

            <!-- STATS -->
            <div class="tts-stats">
                <div class="stat">
                    <span class="stat-label">Characters:</span>
                    <span id="char-count" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Words:</span>
                    <span id="word-count" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Est. Duration:</span>
                    <span id="duration" class="stat-value">0s</span>
                </div>
            </div>
        </div>

    </div>

    </div>

   <footer>
      <div class="footer-container">
        <!-- use text-logo class to display big brand name similar to screenshot -->
        <div class="footer-logo text-logo">sahaay</div>
        <p>FROM WORDS TO VOICE.</p>
        <p>&copy; 2024 Sahaay. All rights reserved.</p>
      </div>
    </footer>

  </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="script.js"></script>
    <script src="tts-enhancer.js"></script>

</body>

</html>

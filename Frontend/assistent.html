<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Themed Chat with Mic Only</title>

    <!-- Remix Icon CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="assis_style.css">

</head>

<body>

    <main id="main">

        <nav>
            <div class="logo">
                <img src="png/fashion.png" alt="">
            </div>
            <div class="ellips"></div>
            <ul>
                <li><a href="./index.html"><i class="ri-home-4-line"></i> Home</a></li>
                <li><a href="./feature.html"><i class="ri-flag-line"></i> Features</a></li>
                <li><a href="./assistent.html"><i class="ri-mic-line"></i> Assistant</a></li>
                <li><a href="./tts-enhancer.html"><i class="ri-magic-line"></i> TTS Enhancer</a></li>
                <li><a href="./support.html"><i class="ri-question-line"></i> Support</a></li>
                <li><a href="about.html"><i class="ri-information-line"></i> About</a></li>
                <li class="sign-link"><a href="./profile.html"><i class="ri-user-3-line"></i> My Profile</a></li>
                <li class="sign-link"><a href="./register.html"><i class="ri-login-box-line"></i> Sign In</a></li>
            </ul>

            <div class="btn1">
                <a id="signin-link" href="./register.html">
                    <button id="btn-signin">sign in</button>
                </a>
            </div>

            <div class="menu-toggle">
                <i class="ri-menu-line"></i>
            </div>

        </nav>


        <div class="profile"></div>


        <div class="main-content">
            <section class="chat-container" aria-label="Assistant chat">
                <div class="animated-mic" aria-hidden="true">
                    <div class="mic-body">
                        <i class="ri-mic-line"></i>
                    </div>
                    <div class="mic-shadow" aria-hidden="true"></div>
                </div>

                <form class="input-container" onsubmit="event.preventDefault(); micAction();" role="search"
                    aria-label="Send message">
                    <input type="text" id="inputMessage" placeholder="Type your message..." autocomplete="off">
                    <button class="mic-btn" id="micBtn" type="button" aria-pressed="false" onclick="micAction()"
                        aria-label="Use microphone">
                        <i class="ri-mic-line"></i>

                        <div id="micTooltip">
                            🎤 Double tap for voice settings
                        </div>
                    </button>
                </form>
            </section>
        </div>

    </main>


    <div id="overlay"></div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="assist_script.js"></script>
    <script src="script.js"></script>
    <script src="form.js"></script>


</body>

</html>
